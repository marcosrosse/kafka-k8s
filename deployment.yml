kind: Deployment
apiVersion: apps/v1
metadata:
  name: kafka
  namespace: kafka
  annotations:
    "prometheus.io/scrape": "true"
    "prometheus.io/port": "5556"
spec:
  template:
    metadata:
      labels:
        app: kafka
        name: kafka
    spec:
      volumes:
       - name: shared-volume #
         emptyDir: {} #
      initContainers: #
        - name: kafka-exporter #
          image: spdigital/prometheus-jmx-exporter-kubernetes:0.3.1 #
          env: #
            - name: SHARED_VOLUME_PATH #
              value: /shared-volume #
          volumeMounts: #
            - mountPath: /shared-volume #
              name: shared-volume #
      containers:
        - name: kafka
          image: bitnami/kafka:latest
          ports:
            - containerPort: 9092
            - containerPort: 5556 #
          env:
            - name: KAFKA_ZOOKEEPER_CONNECT
              value: zookeeper.kafka.svc:2181
            - name: ALLOW_PLAINTEXT_LISTENER
              value: "yes"
            - name: KAFKA_OPTS #
              value: -javaagent:/shared-volume/jmx_prometheus_javaagent.jar=5556:/shared-volume/configs/kafka-config.yaml #
          volumeMounts: #
          - mountPath: /shared-volume #
            name: shared-volume #
  replicas: 1
  selector:
    matchLabels:
      name: kafka
  revisionHistoryLimit: 1
  strategy:
    type: RollingUpdate
